<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Interview AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 30px; /* 增加左右内边距 */
            box-sizing: border-box;
            border-right: 1px solid #333;
        }
        .panel:last-child {
            border-right: none;
        }
        h2 {
            margin-top: 0;
            color: #569cd6;
            font-size: 1.5rem; /* 标题调大 */
            border-bottom: 2px solid #333;
            padding-bottom: 12px;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 18px; /* 🔥 核心修改：正文字体调大，方便面试时扫视 */
            line-height: 1.8;
            padding-right: 10px;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        /* 高亮颜色 */
        .highlight { color: #ce9178; font-weight: bold; font-size: 20px; }
        .timestamp { color: #6a9955; }

        /* 折叠框样式 */
        details {
            margin-bottom: 15px;
            background: #252526;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        summary {
            cursor: pointer;
            color: #808080;
            font-weight: bold;
            outline: none;
            font-size: 16px;
            user-select: none;
        }
        summary:hover {
            color: #d4d4d4;
        }
        .thinking-content {
            color: #9cdcfe;
            font-style: italic;
            margin-top: 10px;
            font-size: 16px; /* 思考过程稍微小一点点，以示区分 */
            padding-top: 10px;
            border-top: 1px dashed #444;
        }

        /* 🔥 新增：流式光标闪烁效果 */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 20px;
            background-color: #569cd6;
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 问题样式 */
        .question-block {
            margin-bottom: 20px;
            padding: 15px;
            background: #2d2d30;
            border-left: 4px solid #569cd6;
            border-radius: 4px;
        }

        /* 答案样式 */
        .answer-block {
            margin-bottom: 20px;
            padding: 15px;
            background: #252526;
            border-left: 4px solid #6a9955;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>🎤 实时语音转写</h2>
        <div id="voiceContent" class="content">等待数据接入...</div>
    </div>

    <div class="panel">
        <h2>🧠 AI 分析结论</h2>
        <div id="responseContent" class="content">等待数据接入...</div>
    </div>

    <script>
        function scrollToBottom(elementId) {
            const el = document.getElementById(elementId);
            el.scrollTop = el.scrollHeight;
        }

        // 解析并格式化大模型的输出内容
        function formatResponseText(text) {
            // 1. 防破版：先把 AI 文本中的尖括号转义，防止大模型输出的代码破坏页面结构
            let formatted = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // 2. 修复折叠：从"🤔 思考过程:\n"开始，精准匹配到"🎯 核心结论"之前的内容
            formatted = formatted.replace(/🤔 思考过程:\n([\s\S]*?)(?=🎯 核心结论)/g,
                '<details><summary>🤔 思考过程 (点击展开看细节)</summary><div class="thinking-content">$1</div></details>'
            );

            // 3. 高亮带时间戳的核心结论标题
            formatted = formatted.replace(/(🎯 核心结论 \[.*?\]:)/g, '<span class="highlight"><br/>$1</span>');

            // 4. 高亮语音那边的独立时间戳
            formatted = formatted.replace(/(\[\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\.\d\])/g, '<span class="timestamp">$1</span>');

            return formatted;
        }

        // 格式化语音识别的文本
        function formatVoiceText(text) {
            return text.replace(/(\[\d{4}-\d{2}-\d{2}\s\d{2}:\d{2}:\d{2}\.\d\])/g, '<span class="timestamp">$1</span>');
        }

        async function fetchLog(filename, elementId, formatFn) {
            try {
                const response = await fetch(`${filename}?t=${new Date().getTime()}`);
                if (response.ok) {
                    const text = await response.text();
                    const el = document.getElementById(elementId);
                    if (el.dataset.rawText !== text) {
                        el.dataset.rawText = text;
                        el.innerHTML = formatFn(text);
                        scrollToBottom(elementId);
                    }
                }
            } catch (error) {
                console.error(`无法读取 ${filename}`, error);
            }
        }

        // 🔥 新增：SSE 流式接收
        let currentAnswerEl = null;
        let isStreaming = false;

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function appendToResponse(html) {
            const el = document.getElementById('responseContent');
            el.innerHTML += html;
            scrollToBottom('responseContent');
        }

        function showCursor() {
            const el = document.getElementById('responseContent');
            if (!document.querySelector('.cursor')) {
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.id = 'streaming-cursor';
                el.appendChild(cursor);
            }
        }

        function removeCursor() {
            const cursor = document.getElementById('streaming-cursor');
            if (cursor) {
                cursor.remove();
            }
        }

        // 初始化 SSE 连接
        function initSSE() {
            const eventSource = new EventSource('http://localhost:8849/stream');

            eventSource.addEventListener('question', (event) => {
                const data = event.data;
                const parts = data.split('|||');
                const content = parts[0];
                const timestamp = parts[1] || '';

                const questionBlock = document.createElement('div');
                questionBlock.className = 'question-block';
                questionBlock.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${escapeHtml(content)}`;

                const el = document.getElementById('responseContent');
                el.appendChild(questionBlock);
                scrollToBottom('responseContent');
            });

            eventSource.addEventListener('answer_start', (event) => {
                const data = event.data;
                const parts = data.split('|||');
                const content = parts[0];
                const timestamp = parts[1] || '';

                const answerBlock = document.createElement('div');
                answerBlock.className = 'answer-block';
                answerBlock.innerHTML = `<span class="timestamp">[${timestamp}]</span> `;

                const contentSpan = document.createElement('span');
                contentSpan.id = 'current-answer-' + Date.now();
                answerBlock.appendChild(contentSpan);

                // 添加光标
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.id = 'streaming-cursor';
                answerBlock.appendChild(cursor);

                const el = document.getElementById('responseContent');
                el.appendChild(answerBlock);
                scrollToBottom('responseContent');

                currentAnswerEl = contentSpan;
                isStreaming = true;
            });

            eventSource.addEventListener('answer_chunk', (event) => {
                if (currentAnswerEl && isStreaming) {
                    const content = event.data;
                    currentAnswerEl.innerHTML += escapeHtml(content);
                    scrollToBottom('responseContent');
                }
            });

            eventSource.addEventListener('answer_end', (event) => {
                removeCursor();
                currentAnswerEl = null;
                isStreaming = false;

                // 添加分隔线
                const separator = document.createElement('div');
                separator.style.borderTop = '2px dashed #333';
                separator.style.margin = '20px 0';

                const el = document.getElementById('responseContent');
                el.appendChild(separator);
                scrollToBottom('responseContent');
            });

            eventSource.addEventListener('error', (event) => {
                removeCursor();
                const errorMsg = document.createElement('div');
                errorMsg.style.color = '#ce9178';
                errorMsg.style.padding = '10px';
                errorMsg.textContent = '❌ ' + event.data;

                const el = document.getElementById('responseContent');
                el.appendChild(errorMsg);
                scrollToBottom('responseContent');

                currentAnswerEl = null;
                isStreaming = false;
            });

            eventSource.addEventListener('shutdown', (event) => {
                removeCursor();
                const shutdownMsg = document.createElement('div');
                shutdownMsg.style.color = '#808080';
                shutdownMsg.style.fontStyle = 'italic';
                shutdownMsg.textContent = '🛑 服务已关闭';

                const el = document.getElementById('responseContent');
                el.appendChild(shutdownMsg);
                scrollToBottom('responseContent');

                eventSource.close();
            });

            eventSource.onerror = (error) => {
                console.error('SSE 连接错误:', error);
                removeCursor();
            };

            console.log('✅ SSE 流式接收已启动');
        }

        // 🔥 页面加载时启动 SSE
        initSSE();

        // 保持轮询（作为备用方案）
        setInterval(() => {
            if (!isStreaming) {
                fetchLog('LLM_voice_txt.txt', 'voiceContent', formatVoiceText);
                fetchLog('LLM_response.txt', 'responseContent', formatResponseText);
            }
        }, 2000);
    </script>
</body>
</html>
